<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges" role="img" aria-label="Pixel polar bear face favicon with sage background">
  <!-- Sage background -->
  <rect x="0" y="0" width="16" height="16" fill="#A3BFA8"/>

  <!-- Ears -->
  <rect x="3" y="1" width="2" height="2" fill="#ffffff"/>
  <rect x="11" y="1" width="2" height="2" fill="#ffffff"/>
  <rect x="3" y="1" width="1" height="1" fill="#dbe8f5"/>
  <rect x="11" y="1" width="1" height="1" fill="#dbe8f5"/>

  <!-- Head -->
  <rect x="2" y="3" width="12" height="10" fill="#ffffff"/>

  <!-- Corner shading for depth -->
  <rect x="2" y="3" width="1" height="1" fill="#eef5fb"/>
  <rect x="13" y="3" width="1" height="1" fill="#eef5fb"/>
  <rect x="2" y="12" width="1" height="1" fill="#eef5fb"/>
  <rect x="13" y="12" width="1" height="1" fill="#eef5fb"/>

  <!-- Eyes -->
  <rect x="5" y="7" width="1" height="1" fill="#1f2d3d"/>
  <rect x="10" y="7" width="1" height="1" fill="#1f2d3d"/>

  <!-- Muzzle -->
  <rect x="6" y="9" width="4" height="3" fill="#f3f8ff"/>

  <!-- Nose and smile -->
  <rect x="7" y="9" width="2" height="1" fill="#1f2d3d"/>
  <rect x="8" y="10" width="1" height="1" fill="#1f2d3d"/>
  <rect x="7" y="11" width="1" height="1" fill="#1f2d3d"/>
  <rect x="9" y="11" width="1" height="1" fill="#1f2d3d"/>

  <!-- Little blush pixels -->
  <rect x="4" y="9" width="1" height="1" fill="#ffd4df"/>
  <rect x="11" y="9" width="1" height="1" fill="#ffd4df"/>
</svg>
